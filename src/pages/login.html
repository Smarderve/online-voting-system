<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | KIUT Elections 2025/26</title>
    <link rel="icon" href="../../assets/images/kiut-white.png" type="image/png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --green-dark: #0d4a22;
        --green: #166534;
        --green-mid: #1a7a3c;
        --green-light: #dcfce7;
        --white: #ffffff;
        --off-white: #f9fafb;
        --gray-200: #e2e8f0;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-700: #334155;
        --text: #1e293b;
        --err: #dc2626;
        --sans: "Poppins", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--green-mid);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      html,body {
        min-height: 100vh;
        font-family: var(--sans);
        scrollbar-width: thin;
        scrollbar-color: var(--green-mid) #f1f5f9;
      }
      body {
        background: var(--off-white);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }
      .nav {
        background: var(--green-dark);
        padding: 0 40px;
        height: 66px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .nav-logo-img {
        height: 64px;
        width: 64px;
        object-fit: contain;
        filter: brightness(0) invert(1);
      }
      .nav-brand-text span {
        display: block;
        line-height: 1.15;
      }
      .nav-brand-text .top {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .nav-brand-text .bot {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.5px;
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        border-radius: 8px;
        color: #fff;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
        border: 2px solid rgba(255, 255, 255, 0.7);
        background: transparent;
      }
      .nav-back:hover {
        border-color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }
      .page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--gray-200);
        width: 100%;
        max-width: 440px;
        padding: 40px;
      }
      .card-header {
        margin-bottom: 32px;
      }
      .card-header h2 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
      }
      .card-header p {
        font-size: 13.5px;
        color: var(--gray-500);
        font-weight: 400;
        line-height: 1.6;
      }
      .error-banner {
        display: none;
        background: #fef2f2;
        border: 1.5px solid #fecaca;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 20px;
        font-size: 13px;
        color: var(--err);
        align-items: center;
        gap: 8px;
      }
      .error-banner.show {
        display: flex;
      }
      .error-banner svg {
        flex-shrink: 0;
      }
      .field {
        margin-bottom: 20px;
      }
      .field label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--gray-700);
        margin-bottom: 7px;
      }
      .field input {
        width: 100%;
        padding: 12px 16px;
        background: var(--off-white);
        border: 1.5px solid var(--gray-200);
        border-radius: 10px;
        font-family: var(--sans);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: all 0.2s;
      }
      .field input:focus {
        border-color: var(--green);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.1);
      }
      .field input.err {
        border-color: var(--err);
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 46px;
      }
      .pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gray-400);
        display: flex;
        align-items: center;
        padding: 4px;
        transition: color 0.15s;
      }
      .pw-toggle:hover {
        color: var(--gray-700);
      }
      .field-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 7px;
      }
      .field-row label {
        font-size: 13px;
        font-weight: 600;
        color: var(--gray-700);
        margin: 0;
      }
      .forgot-link {
        font-size: 12px;
        color: var(--green);
        font-weight: 500;
        text-decoration: none;
        transition: color 0.15s;
      }
      .forgot-link:hover {
        color: var(--green-dark);
        text-decoration: underline;
      }
      .btn-primary {
        width: 100%;
        padding: 13px;
        background: var(--green);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
      }
      .btn-primary:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
        box-shadow: 0 5px 18px rgba(22, 101, 52, 0.25);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-primary:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        display: none;
        flex-shrink: 0;
      }
      .btn-primary.loading .spinner {
        display: block;
      }
      .btn-primary.loading .btn-txt {
        opacity: 0.7;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .card-note {
        text-align: center;
        font-size: 13px;
        color: var(--gray-500);
        margin-top: 20px;
      }
      .card-note a {
        color: var(--green);
        font-weight: 600;
        text-decoration: none;
      }
      .card-note a:hover {
        color: var(--green-dark);
        text-decoration: underline;
      }
      @media (max-width: 960px) {
        .nav {
          padding: 0 20px;
        }
        .nav-brand-text .top {
          font-size: 10px;
          font-weight: 600;
        }
        .nav-brand-text .bot {
          font-size: 9px;
        }
        .nav-back {
          gap: 4px;
          padding: 5px 10px;
          font-size: 10px;
        }
      }
      @media (max-width: 640px) {
        .nav {
          padding: 0 20px;
        }
        .nav-brand-text .top {
          font-size: 10px;
          font-weight: 600;
        }
        .nav-brand-text .bot {
          font-size: 9px;
        }
        .nav-back {
          gap: 4px;
          padding: 5px 10px;
          font-size: 10px;
        }
        .page {
          padding: 24px 16px;
        }
        .card {
          padding: 28px 24px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="../../main/index.html" class="nav-brand">
        <img src="../../assets/images/kiut-white.png" alt="KIUT" class="nav-logo-img" onerror="this.style.display = 'none'"/>
        <div class="nav-brand-text">
          <span class="top">Kampala International University of Tanzania</span>
          <span class="bot">KIUTSO Elections 2025/26</span>
        </div>
      </a>
      <a href="../../main/index.html" class="nav-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>Home
      </a>
    </nav>
    <div class="page">
      <div class="card">
        <div class="card-header">
          <h2>Login</h2>
          <p>Enter your registration number or Username.</p>
        </div>
        <div class="error-banner" id="error-banner">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="error-msg">Invalid registration number or password.</span>
        </div>
        <div class="field">
          <label for="reg">User ID</label>
          <input type="text" id="reg" autocomplete="off"/>
        </div>
        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <div class="pw-wrap">
            <input type="password" id="password" autocomplete="off"/>
            <button class="pw-toggle" type="button" onclick="togglePw()" id="pw-btn" aria-label="Show password">
              <svg id="eye-off" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <svg id="eye-on" style="display: none" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">
          <span class="spinner"></span>
          <span class="btn-txt">Login</span>
        </button>
        <p class="card-note">Don't have an account? 
          <a href="register.html">Register here</a>
        </p>
      </div>
    </div>
    <script>
      function togglePw() {
        const pw = document.getElementById("password");
        const off = document.getElementById("eye-off");
        const on = document.getElementById("eye-on");

        if (pw.type === "password") {
          pw.type = "text";
          off.style.display = "none";
          on.style.display = "";
        } else {
          pw.type = "password";
          off.style.display = "";
          on.style.display = "none";
        }
      }

      function doLogin() {
        const reg = document.getElementById("reg");
        const pw = document.getElementById("password");
        const btn = document.getElementById("login-btn");
        const banner = document.getElementById("error-banner");

        banner.classList.remove("show");
        reg.classList.remove("err");
        pw.classList.remove("err");

        let ok = true;
        if (!reg.value.trim()) {
          reg.classList.add("err");
          ok = false;
        }
        if (!pw.value) {
          pw.classList.add("err");
          ok = false;
        }
        if (!ok) return;

        btn.classList.add("loading");
        btn.disabled = true;

      }

      document.querySelectorAll("input").forEach((inp) => {
        inp.addEventListener("input", () => {
          inp.classList.remove("err");
          document.getElementById("error-banner").classList.remove("show");
        });
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
