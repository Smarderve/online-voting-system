<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Account | KIUTSO Elections 2025/26</title>
    <link rel="icon" href="../../assets/images/kiut-white.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --green-dark: #0d4a22;
        --green: #166534;
        --green-mid: #1a7a3c;
        --green-light: #dcfce7;
        --gold: #f59e0b;
        --white: #ffffff;
        --off-white: #f9fafb;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-700: #334155;
        --text: #1e293b;
        --err: #dc2626;
        --sans: "Poppins", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--green-mid);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--gray-100);
      }
      html,body {
        min-height: 100vh;
        font-family: var(--sans);
        scrollbar-width: thin;
        scrollbar-color: var(--green-mid) var(--gray-100);
      }
      body {
        background: var(--off-white);
        color: var(--text);
        cursor: default;
        display: flex;
        flex-direction: column;
      }
      .nav {
        background: var(--green-dark);
        padding: 0 40px;
        height: 66px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .nav-logo-img {
        height: 64px;
        width: 64px;
        object-fit: contain;
        filter: brightness(0) invert(1);
      }
      .nav-brand-text span {
        display: block;
        line-height: 1.15;
      }
      .nav-brand-text .top {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .nav-brand-text .bot {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.5px;
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        border-radius: 8px;
        color: #fff;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
        border: 2px solid rgba(255, 255, 255, 0.7);
        background: transparent;
      }
      .nav-back:hover {
        border-color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }
      .page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--gray-200);
        width: 100%;
        max-width: 440px;
        padding: 40px;
      }
      .card-header {
        margin-bottom: 32px;
      }
      .card-header h2 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
      }
      .card-header p {
        font-size: 13.5px;
        color: var(--gray-500);
        font-weight: 400;
        line-height: 1.6;
      }
      .field {
        margin-bottom: 20px;
      }
      .field label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--gray-700);
        margin-bottom: 7px;
      }
      .field input {
        width: 100%;
        padding: 12px 16px;
        background: var(--off-white);
        border: 1.5px solid var(--gray-200);
        border-radius: 10px;
        font-family: var(--sans);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: all 0.2s;
      }
      .field input:focus {
        border-color: var(--green);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.1);
      }
      .field input.err {
        border-color: var(--err);
      }
      .field-hint {
        font-size: 11.5px;
        color: var(--gray-400);
        margin-top: 6px;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }
      .toggle-divider {
        font-size: 12px;
        color: var(--gray-400);
      }
      .toggle-btn {
        background: none;
        border: none;
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 600;
        color: var(--green);
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
        text-underline-offset: 2px;
        transition: color 0.15s;
      }
      .toggle-btn:hover {
        color: var(--green-dark);
      }
      .btn-primary {
        width: 100%;
        padding: 13px;
        background: var(--green);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
      }
      .btn-primary:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
        box-shadow: 0 5px 18px rgba(22, 101, 52, 0.25);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-ghost {
        width: 100%;
        padding: 11px;
        background: transparent;
        border: 1.5px solid var(--gray-200);
        border-radius: 10px;
        color: var(--gray-500);
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn-ghost:hover {
        border-color: var(--gray-400);
        color: var(--gray-700);
      }
      .card-note {
        text-align: center;
        font-size: 13px;
        color: var(--gray-500);
        margin-top: 20px;
      }
      .card-note a {
        color: var(--green);
        font-weight: 600;
        text-decoration: none;
      }
      .card-note a:hover {
        color: var(--green-dark);
        text-decoration: underline;
      }
      .panel {
        display: none;
      }
      .panel.show {
        display: block;
        animation: fadeSlide 0.3s ease;
      }
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateX(10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @media (max-width: 960px) {
        .nav {
          padding: 0 20px;
        }
        .nav-brand-text .top {
        font-size: 10px;
        font-weight: 600;
        }
        .nav-brand-text .bot {
        font-size: 9px;
        }
        .nav-back {
          gap: 4px;
          padding: 5px 10px;
          font-size: 10px;
        }
      }
      @media (max-width: 640px) {
        .nav {
          padding: 0 20px;
        }
        .nav-brand-text .top {
        font-size: 10px;
        font-weight: 600;
        }
        .nav-brand-text .bot {
        font-size: 9px;
        }
        .nav-back {
          gap: 4px;
          padding: 5px 10px;
          font-size: 10px;
        }
        .page {
          padding: 24px 16px;
        }
        .card {
          padding: 28px 24px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="../../main/index.html" class="nav-brand">
        <img src="../../assets/images/kiut-white.png" alt="KIUT" class="nav-logo-img" onerror="this.style.display = 'none'"/>
        <div class="nav-brand-text">
          <span class="top">Kampala International University of Tanzania</span>
          <span class="bot">KIUTSO Elections 2025/26</span>
        </div>
      </a>
      <a href="../../main/index.html" class="nav-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>Home
      </a>
    </nav>
    <div class="page">
      <div class="card">
        <div id="panel-1" class="panel show">
          <div class="card-header">
            <h2>Register to Vote</h2>
            <p>Enter your details below.</p>
          </div>
          <div class="field">
            <label for="reg">Registration Number:</label>
            <input type="text" id="reg" autocomplete="off"/>
          </div>
          <div id="email-field" class="field">
            <label for="email">Email Address:</label>
            <input type="email" id="email"/>
            <div class="toggle-row">
              <span class="toggle-divider">or</span>
              <button class="toggle-btn" onclick="toggleContact('phone')">Use phone number instead</button>
            </div>
          </div>
          <div id="phone-field" class="field" style="display: none">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" />
            <div class="toggle-row">
              <span class="toggle-divider">or</span>
              <button class="toggle-btn" onclick="toggleContact('email')">Use email instead</button>
            </div>
          </div>
          <div class="field">
            <label for="password">Password:</label>
            <input type="password" id="password" autocomplete="off"/>
          </div>
          <div class="field">
            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" autocomplete="off"/>
          </div>
          <button class="btn-primary" >Register Account
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
          <p class="card-note">Already registered? 
            <a href="../pages/login.html">Login</a>
          </p>
        </div>
      </div>
    </div>
    <script>
      let countdown,
        usingPhone = false;

      function toggleContact(to) {
        usingPhone = to === "phone";
        document.getElementById("email-field").style.display = usingPhone ? "none" : "";
        document.getElementById("phone-field").style.display = usingPhone ? "" : "none";
        document.getElementById("email").required = !usingPhone;
        document.getElementById("phone").required = usingPhone;
        if (usingPhone) document.getElementById("email").value = "";
        else document.getElementById("phone").value = "";
      }

      document.querySelectorAll("input").forEach(
        (i) =>i.addEventListener("input", () => i.classList.remove("err")),
      );
    </script>
  </body>
</html>
